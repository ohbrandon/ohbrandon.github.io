    <style>
        :root {
            /* Ultra-dark base remains */
            --bg-top: #07090f;
            --bg-bottom: #010205;
            
            /* Icy Blue Lighter highlight colors */
            --hl-icy-top: rgba(125, 211, 252, 0.18); /* Soft sky blue */
            --hl-icy-bottom: rgba(34, 211, 238, 0.12); /* Soft cyan */
            
            /* Smoky glass background, tinted slightly blue */
            --glass-bg: rgba(10, 15, 25, 0.7);
            --glass-border: rgba(125, 211, 252, 0.12); /* Icy blue tinted border */
            
            /* Text - cooler white */
            --text-main: #f0f9ff;
            --text-muted: #94a3b8;

            /* Gradient text accent */
            --icy-accent-start: #f8fafc;
            --icy-accent-end: #7dd3fc; /* Sky 300 */
        }

        body {
            margin: 0;
            font-family: 'Rubik', 'Arial', sans-serif;
            background-color: var(--bg-bottom);
            
            /* ADVANCED BACKDROP: Stacking linear and icy circular highlights */
            background-image: 
                radial-gradient(at 15% 15%, var(--hl-icy-top) 0px, transparent 40%),
                radial-gradient(at 85% 85%, var(--hl-icy-bottom) 0px, transparent 35%),
                linear-gradient(to bottom, var(--bg-top) 0%, var(--bg-bottom) 100%);
                
            background-attachment: fixed;
            color: var(--text-main);
            overflow-x: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            position: relative; /* Needed to position the animated border correctly */
            max-width: 600px;
            margin: 60px auto 20px;
            padding: 30px;
            border-radius: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            /* Deep shadows with a subtle icy outer glow */
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.6), 
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 0 15px rgba(56, 189, 248, 0.15); /* Subtle icy aura */
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* NEW: The isolated animated border layer */
        .border-trace {
            position: absolute;
            inset: -1px
             ; /* Align perfectly over the container's physical 1px border */
            border-radius: 20px; /* Match container radius */
            padding: 1px; 
             /* The thickness of the animated line */
            
            /* The CSS Mask cuts out the center, leaving ONLY the 1px padding area visible */
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none; /* Let clicks pass through to content */
            z-index: 10;
        }

        /* The spinning conic gradient restricted by the mask above */
        .border-trace::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; 
            width: 200%; height: 200%;
            background: conic-gradient(
                from 0deg, 
                transparent 80%, 
                rgba(125, 211, 252, .3) 100% /* Solid icy blue tail */
            );
            animation: borderChase 30s linear infinite;
            
        }

        @keyframes borderChase {
            100% { transform: rotate(360deg);
             }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        header {
            display: grid;
            grid-template-columns: 1fr max-content;
            align-items: center;
            gap: 30px; 
            position: relative;
            z-index: 1; /* Keep content above background layers */
        }

        header :not(.avatar) {
            grid-column: 1;
        }

        .profile {
            padding-top: 5px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--icy-accent-start) 0%, var(--icy-accent-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .desc {
            margin: 0px 0 0px;
            padding-right: 10px; 
            font-size: 15px;
            font-weight: 400;
            line-height: 1.4;
            color: var(--text-muted);
        }

        footer {
            margin-top: auto;
            margin-bottom: 20px;
            padding: 15px;
            font-size: 12px;
            color: #4b5563; 
            text-align: center;
            animation: focusLoad 2s ease-in-out;
            letter-spacing: 0.5px;
        }

        footer img {
            vertical-align: middle;
            margin-right: 4px;
            width: 12px;
            opacity: 1.5;
            transition: opacity 0.3s;
        }
        
        footer:hover img {
            opacity: 10.3;
        }

        footer .logo {
            margin-bottom: 6px;
            width: 16px;
        }

        .avatar {
            width: 140px;
            height: 180px;
            border-radius: 20px;
            grid-row: 1 / span 3;
            grid-column: 2;
            position: relative;
        }

        .avatar::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(125, 211, 252, 0.4), rgba(7, 9, 15, 0.2));
            z-index: -1;
            opacity: 0.8;
            filter: blur(8px);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
            border: 2px solid rgba(125, 211, 252, 0.3); 
        }

        .contact-info {
            display: flex;
            gap: 15px;
            padding: 10px 0;
        }

        .contact-info a {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 64px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }

        .contact-info a:hover {
            background: rgba(125, 211, 252, 0.15); 
            border-color: rgba(125, 211, 252, 0.3); 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.3); 
        }

        .contact-info img {
            width: 50px;
            height: auto;
            opacity: .5;
            transition: all 0.3s ease;
            filter: grayscale(0%) brightness(1.1);
        }

        .contact-info a:hover img {
            opacity: 0.9;
            filter: grayscale(50%) brightness(1.4) drop-shadow(0 0 2px rgba(125, 211, 252, 0.6));
            transform: scale(1.05);
        }

        @media screen and (max-width: 480px) {
            .container {
                margin: 20px;
                padding: 20px;
            }
            
            header {
                grid-template-columns: 1fr;
                text-align: center;
            }

            header :not(.avatar) {
                grid-column: 1;
            }

            .avatar {
                grid-row: 1;
                grid-column: 1;
                margin: 0 auto 15px;
                width: 120px;
                height: 120px;
            }

            .contact-info {
                justify-content: center;
                flex-wrap: wrap;
            }
            
            .desc {
                padding-right: 0; 
            }
        }

        .focus {
            margin-top: 30px;
            padding: 25px;
            background: rgba(10, 15, 25, 0.5); 
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            animation: focusLoad 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.2s;
            opacity: 0;
            position: relative;
            z-index: 1;
        }

        @keyframes focusLoad {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .focus h2 {
            margin: 0 0 15px;
            font-size: 18px;
            font-weight: 500;
            color: #d1d5db;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .focus ul {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 0;
        }

        .focus li {
            font-size: 14px;
            position: relative;
            padding-left: 20px;
            color: #f8fafc;
            transition: transform 0.2s ease, color 1.9s ease;
            cursor: default;
        }

        .focus li:hover {
            transform: translateX(.1px);
            color: var(--text-main);
        }

        .focus li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(125, 211, 252, 0.8), rgba(6, 182, 212, 0.6));
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.6); 
            opacity: 0.7;
        }

        * {
            -webkit-tap-highlight-color: rgba(255, 255, 255, 0) !important; 
            -webkit-focus-ring-color: rgba(255, 255, 255, 0) !important; 
            outline: none !important;
        }

        [data-tooltip] {
            --arrow-size: 5px;
            position: relative;
            z-index: 10;
        }

        [data-tooltip]:before,
        [data-tooltip]:after {
            position: absolute;
            visibility: hidden;
            opacity: 0;
            left: 50%;
            bottom: calc(100% + var(--arrow-size));
            pointer-events: none;
            transition: 0.2s ease;
            will-change: transform;
        }

        [data-tooltip]:before {
            content: attr(data-tooltip);
            padding: 8px 12px;
            min-width: max-content;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            background: rgba(10, 15, 25, 0.98); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(125, 211, 252, 0.15); 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            color: var(--text-main);
            text-align: center;
            transform: translate(-50%,  calc(0px - var(--arrow-size))) scale(0.9);
        }

        [data-tooltip]:after {
            content: '';
            border-style: solid;
            border-width: var(--arrow-size) var(--arrow-size) 0px var(--arrow-size);
            border-color: rgba(125, 211, 252, 0.15) transparent transparent transparent; 
            transform-origin: top;
            transform: translateX(-50%) scaleY(0);
        }

        [data-tooltip]:hover:before,
        [data-tooltip]:hover:after {
            visibility: visible;
            opacity: 1;
        }

        [data-tooltip]:hover:before {
            transition-delay: 0.1s;
            transform: translate(-50%, calc(0px - var(--arrow-size) - 4px)) scale(1);
        }

        [data-tooltip]:hover:after {
            transition-delay: 0.1s;
            transform: translateX(-50%) scaleY(1);
        }

        [data-tooltip-location="bottom"]:before,
        [data-tooltip-location="bottom"]:after {
            top: calc(100% + var(--arrow-size));
            bottom: auto;
        }

        [data-tooltip-location="bottom"]:before {
            transform: translate(-50%, var(--arrow-size)) scale(0.9);
        }
        [data-tooltip-location="bottom"]:hover:before {
            transform: translate(-50%, calc(var(--arrow-size) + 4px)) scale(1);
        }

        [data-tooltip-location="bottom"]:after {
            border-width: 0px var(--arrow-size) var(--arrow-size) var(--arrow-size);
            border-color: transparent transparent rgba(125, 211, 252, 0.15) transparent; 
            transform-origin: bottom;
        }
    </style>

    <script>
        function decodeBase64(encoded) {
          return decodeURIComponent(atob(encoded).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
          }).join(''));
        }
